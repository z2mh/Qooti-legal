<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qooti – Legal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; background: #f9fafb;
    }
    .card {
      background: #fff; border-radius: 16px; padding: 40px 48px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .logo-dot {
      width: 52px; height: 52px; border-radius: 14px;
      background: #FF751F; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 16px;
    }
    .logo-dot span { color: #fff; font-size: 28px; font-weight: 800; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 8px; }
    p { color: #6b7280; margin: 0 0 28px; font-size: 15px; }
    .links { display: flex; gap: 12px; justify-content: center; }
    a {
      display: inline-block; padding: 12px 24px;
      background: #FF751F; color: #fff; text-decoration: none;
      border-radius: 10px; font-weight: 600; font-size: 15px;
    }
    a.secondary {
      background: #f3f4f6; color: #374151;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-dot"><span>Q</span></div>
    <h1>Qooti Legal</h1>
    <p>Calorie & nutrition tracking app</p>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html" class="secondary">Terms of Service</a>
    </div>
  </div>
</body>
</html>
